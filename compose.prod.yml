services:
  db:
    image: postgres:17-alpine
    restart: always
    container_name: postgres
    env_file: ./.env
    volumes:
      - db:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  server:
    build: ./server
    container_name: nodejs
    env_file: 
      - ./.env
      - ./server/.env
    ports:
      - "3001:3001"
    depends_on: 
      - db
  
  client:
    build: ./client
    container_name: vite
    env_file: ./.env
    ports:
      - "443:443"
      - "80:80"
    depends_on:
      - server
    volumes:
      - ./server/certs/cert.pem:/etc/nginx/certs/cert.pem
      - ./server/certs/cert-key.pem:/etc/nginx/certs/cert-key.pem


volumes:
  db: