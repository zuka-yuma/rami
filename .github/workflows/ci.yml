name: rami

on:
  pull_request:
    branches: [main]

jobs:
  server-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server

    steps:
    - name: Checkout code
      uses: actions/checkout@v7
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: ./server/package-lock.json
    - name: Install dependencies
      run: npm ci
    - name: Run lint
      run: npm run lint
    - name: Run build
      run: npm run build

  client-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client

    steps:
    - name: Checkout code
      uses: actions/checkout@v7
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: ./client/package-lock.json
    - name: Install dependencies
      run: npm ci
    - name: Run lint
      run: npm run lint
    - name: Run build
      run: npm run build